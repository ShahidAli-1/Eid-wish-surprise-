<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌸 Eid Mubarak My Beautiful Wife 🌸</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'Arial', cursive, sans-serif;
            overflow-x: hidden;
            position: relative;
            background: #1a1a2e;
        }

        /* ===== BACKGROUND EFFECTS ===== */
        .stars-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            animation: twinkle var(--duration) infinite;
            opacity: var(--opacity);
            width: var(--size);
            height: var(--size);
        }

        @keyframes twinkle {
            0%, 100% { opacity: var(--opacity); transform: scale(1); }
            50% { opacity: 1; transform: scale(1.2); }
        }

        .moon {
            position: fixed;
            top: 30px;
            right: 30px;
            width: 80px;
            height: 80px;
            background: radial-gradient(circle at 30% 30%, #fff9e6, #f1e6b0);
            border-radius: 50%;
            box-shadow: 0 0 50px #fff9e6, 0 0 100px #f1e6b0;
            z-index: 1;
            animation: moonGlow 4s infinite alternate;
        }

        @keyframes moonGlow {
            from { box-shadow: 0 0 50px #fff9e6, 0 0 100px #f1e6b0; }
            to { box-shadow: 0 0 70px #fff9e6, 0 0 140px #f1e6b0; }
        }

        .floating-petal {
            position: fixed;
            color: #ffb7c5;
            font-size: 20px;
            pointer-events: none;
            z-index: 1;
            animation: petalFall linear infinite;
            filter: drop-shadow(0 0 5px #ff69b4);
        }

        @keyframes petalFall {
            0% { transform: translateY(-10vh) rotate(0deg); opacity: 1; }
            100% { transform: translateY(100vh) rotate(360deg); opacity: 0; }
        }

        .lantern {
            position: fixed;
            bottom: 20px;
            left: 20px;
            font-size: 40px;
            animation: lanternSway 3s infinite alternate;
            filter: drop-shadow(0 0 20px #ffa500);
            z-index: 1;
            cursor: pointer;
        }

        @keyframes lanternSway {
            from { transform: rotate(-5deg); }
            to { transform: rotate(5deg); }
        }

        /* ===== HEART TRAIL ===== */
        .heart-trail {
            position: fixed;
            width: 20px;
            height: 20px;
            pointer-events: none;
            z-index: 9999;
            animation: heartFade 1s forwards;
            color: #ff69b4;
            font-size: 20px;
            text-align: center;
            line-height: 20px;
        }

        @keyframes heartFade {
            0% { transform: scale(1) translateY(0); opacity: 1; }
            100% { transform: scale(1.5) translateY(-50px); opacity: 0; }
        }

        /* ===== MAIN SCREEN - WIDER ===== */
        .screen {
            position: relative;
            z-index: 10;
            background: rgba(255, 240, 250, 0.9);
            backdrop-filter: blur(12px);
            border-radius: 50px;
            padding: 35px;
            width: 650px;
            max-width: 95%;
            min-height: 700px;
            box-shadow: 0 30px 50px rgba(0,0,0,0.5), 
                        0 0 0 4px #f8d7aa inset,
                        0 0 30px #ffd700;
            border: 2px solid #ebc99b;
            transition: all 0.3s ease;
            text-align: center;
            margin: 20px;
        }

        h1 {
            font-size: 2.5rem;
            color: #8b3a3a;
            text-shadow: 3px 3px 0 #ffd966, 0 0 20px #ff69b4;
            margin-bottom: 15px;
            font-family: 'Lucida Handwriting', cursive;
        }

        h2 {
            color: #6d3b1e;
            text-shadow: 2px 2px 0 #fbe9c3;
            font-size: 2rem;
        }

        h3 {
            color: #b34e4e;
            font-size: 1.8rem;
        }

        /* ===== LOVE NAME STYLES ===== */
        .love-name {
            display: inline-block;
            animation: nameChange 8s infinite;
            font-weight: bold;
            font-size: 1.2em;
        }

        @keyframes nameChange {
            0% { color: #ff1493; text-shadow: 0 0 10px #ff69b4; }
            25% { color: #ff6b6b; text-shadow: 0 0 10px #ff6b6b; }
            50% { color: #9370db; text-shadow: 0 0 10px #9370db; }
            75% { color: #ffa500; text-shadow: 0 0 10px #ffa500; }
            100% { color: #ff1493; text-shadow: 0 0 10px #ff69b4; }
        }

        .name-container {
            font-size: 2rem;
            margin: 15px 0;
            min-height: 80px;
        }

        .name-part {
            display: inline-block;
            transition: all 0.5s;
        }

        .name-part:nth-child(1) { animation: nameFloat 4s infinite; }
        .name-part:nth-child(2) { animation: nameFloat 4s infinite 1s; }
        .name-part:nth-child(3) { animation: nameFloat 4s infinite 2s; }
        .name-part:nth-child(4) { animation: nameFloat 4s infinite 3s; }

        @keyframes nameFloat {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        input, button {
            font-size: 1.1rem;
            padding: 15px 25px;
            margin: 10px 0;
            border-radius: 60px;
            border: 3px solid #c48f5a;
            outline: none;
            width: 90%;
            background: #fffcf0;
            font-family: inherit;
            transition: all 0.3s;
        }

        button {
            background: linear-gradient(45deg, #ed9a4a, #f7b26a);
            color: white;
            font-weight: bold;
            border: none;
            border-bottom: 5px solid #9b4a24;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
            transform: translateY(0);
            transition: 0.1s;
        }

        button:active {
            transform: translateY(5px);
            border-bottom-width: 2px;
        }

        .hint {
            background: #ffecd6;
            padding: 8px 20px;
            border-radius: 50px;
            display: inline-block;
            border: 2px dashed #d17d44;
            font-size: 1rem;
        }

        /* ===== LOVE CIRCLE ===== */
        .circle-container {
            position: relative;
            width: 200px;
            height: 200px;
            margin: 20px auto;
        }

        .circle {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: #ddd8d0;
            box-shadow: 0 0 0 5px #fbc8a6, inset 0 0 0 5px #fff3e0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 5rem;
            transition: all 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            position: relative;
            animation: circlePulse 2s infinite;
        }

        @keyframes circlePulse {
            0% { box-shadow: 0 0 0 5px #fbc8a6, inset 0 0 0 5px #fff3e0; }
            50% { box-shadow: 0 0 0 8px #ffb6c1, inset 0 0 0 8px #ffe4e1; }
            100% { box-shadow: 0 0 0 5px #fbc8a6, inset 0 0 0 5px #fff3e0; }
        }

        .circle.filled {
            background: #ffb7c5;
            box-shadow: 0 0 50px #ff1493, 0 0 0 8px #ff69b4, inset 0 0 0 8px #ffe4e1;
        }

        .love-switch {
            background: #fabb4f;
            padding: 15px 30px;
            border-radius: 60px;
            font-weight: bold;
            font-size: 1.2rem;
            cursor: pointer;
            transition: 0.3s;
            display: inline-block;
            box-shadow: 0 5px 0 #9b4a24;
            margin: 10px 0;
        }

        .love-switch.on {
            background: linear-gradient(45deg, #ff1493, #ff69b4);
            color: white;
            box-shadow: 0 5px 0 #8b0a50;
        }

        /* ===== BOUQUET - NEW STYLE ===== */
        .bouquet-area {
            margin: 20px 0;
            transition: all 0.5s;
        }

        .bouquet {
            display: inline-block;
            position: relative;
            cursor: pointer;
            transition: 0.5s;
            filter: drop-shadow(0 10px 10px #ab5f30);
            animation: bouquetSway 3s infinite alternate;
        }

        .real-bouquet {
            display: flex;
            justify-content: center;
            align-items: flex-end;
            gap: -5px;
            position: relative;
        }

        .flower-stem {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0 -8px;
        }

        .flower-head {
            font-size: 2.5rem;
            transform: rotate(var(--rotation));
            margin-bottom: -5px;
        }

        .stem {
            width: 4px;
            height: 60px;
            background: linear-gradient(to top, #2e7d32, #4caf50);
            border-radius: 2px;
            margin-top: -5px;
        }

        .ribbon {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            width: 60px;
            height: 15px;
            background: linear-gradient(45deg, #ff69b4, #ff1493);
            border-radius: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            z-index: 10;
        }

        .ribbon::before, .ribbon::after {
            content: '';
            position: absolute;
            width: 15px;
            height: 25px;
            background: linear-gradient(45deg, #ff69b4, #ff1493);
            top: -10px;
        }

        .ribbon::before {
            left: 5px;
            transform: rotate(-20deg);
        }

        .ribbon::after {
            right: 5px;
            transform: rotate(20deg);
        }

        @keyframes bouquetSway {
            0% { transform: rotate(-2deg); }
            100% { transform: rotate(2deg); }
        }

        .bouquet.moved {
            transform: translateY(-250px) scale(0.7);
            filter: drop-shadow(0 0 30px gold);
            opacity: 0.8;
        }

        .eid-card {
            background: linear-gradient(135deg, #f9e6b3, #f1c40f);
            padding: 20px;
            border-radius: 30px;
            border: 5px solid #c49a6c;
            margin: 20px 0;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            animation: cardAppear 0.5s;
        }

        @keyframes cardAppear {
            from { transform: scale(0); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .eid-text {
            font-size: 3rem;
            font-weight: bold;
            background: linear-gradient(45deg, #c06b2b, #d4af37, #c06b2b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 2px 2px 0 #ffd58c;
            margin: 10px 0;
            animation: textGlow 2s infinite;
        }

        @keyframes textGlow {
            0% { filter: drop-shadow(0 0 5px gold); }
            50% { filter: drop-shadow(0 0 20px #ff69b4); }
            100% { filter: drop-shadow(0 0 5px gold); }
        }

        /* ===== GALLERY ===== */
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin: 20px 0;
        }

        .memory-card {
            background: #ffdab9;
            border-radius: 20px;
            padding: 15px 5px;
            cursor: pointer;
            transition: 0.3s;
            border: 2px solid #b34e4e;
            animation: cardFloat 3s infinite alternate;
        }

        @keyframes cardFloat {
            from { transform: translateY(0); }
            to { transform: translateY(-5px); }
        }

        .memory-card:hover {
            transform: scale(1.05);
            background: #ffe4b5;
            box-shadow: 0 0 30px #ffa500;
        }

        .memory-icon {
            font-size: 2rem;
        }

        .memory-date {
            font-size: 0.8rem;
            color: #8b4513;
        }

        /* ===== GIFT BOXES ===== */
        .gifts-container {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 20px 0;
            flex-wrap: wrap;
        }

        .gift-box {
            font-size: 3.5rem;
            cursor: pointer;
            transition: 0.3s;
            filter: drop-shadow(0 5px 5px #333);
            animation: giftWiggle 2s infinite;
        }

        @keyframes giftWiggle {
            0%, 100% { transform: rotate(0deg); }
            25% { transform: rotate(5deg); }
            75% { transform: rotate(-5deg); }
        }

        .gift-box:hover {
            transform: scale(1.2);
            filter: drop-shadow(0 0 20px gold);
        }

        .gift-message {
            background: #fff0d4;
            border-radius: 30px;
            padding: 15px;
            margin: 10px 0;
            border: 2px solid #ff69b4;
            font-size: 1.2rem;
        }

        /* ===== PRAYER CARD ===== */
        .prayer-card {
            width: 250px;
            height: 300px;
            margin: 20px auto;
            position: relative;
            cursor: pointer;
            transition: 0.5s;
            transform-style: preserve-3d;
        }

        .prayer-card.flipped {
            transform: rotateY(180deg);
        }

        .card-front, .card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 30px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .card-front {
            background: linear-gradient(135deg, #f5e6d3, #e6c9a8);
            border: 3px solid #c49a6c;
        }

        .card-back {
            background: linear-gradient(135deg, #8b4513, #cd853f);
            color: white;
            transform: rotateY(180deg);
            border: 3px solid #ffd700;
        }

        .prayer-arabic {
            font-size: 1.8rem;
            margin-bottom: 15px;
        }

        /* ===== YES/NO GAME ===== */
        .yes-no-container {
            min-height: 250px;
            position: relative;
            margin: 30px 0;
        }

        .btn-yes, .btn-no {
            font-size: 1.5rem;
            padding: 15px 30px;
            margin: 0 15px;
            border: none;
            border-radius: 60px;
            cursor: pointer;
            transition: 0.2s;
            font-weight: bold;
        }

        .btn-yes {
            background: linear-gradient(45deg, #56ab56, #4caf50);
            color: white;
            box-shadow: 0 5px 0 #1b4f1b;
        }

        .btn-no {
            background: linear-gradient(45deg, #c14a4a, #dc143c);
            color: white;
            position: relative;
            box-shadow: 0 5px 0 #4e1414;
        }

        .catch-phrase {
            font-size: 2rem;
            color: #dc143c;
            animation: bounce 0.5s infinite;
            margin: 20px 0;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        /* ===== FIREWORKS ===== */
        .firework {
            position: fixed;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            pointer-events: none;
            z-index: 9998;
            animation: fireworkExplode 1s forwards;
        }

        @keyframes fireworkExplode {
            0% { transform: scale(1); opacity: 1; }
            100% { transform: scale(30); opacity: 0; }
        }

        .confetti {
            position: fixed;
            width: 10px;
            height: 20px;
            background: var(--color);
            opacity: 0.8;
            pointer-events: none;
            z-index: 9997;
            animation: confettiFall 3s forwards;
        }

        @keyframes confettiFall {
            0% { transform: translateY(-10vh) rotate(0deg); }
            100% { transform: translateY(100vh) rotate(720deg); }
        }

        .floating-heart {
            position: fixed;
            color: #ff69b4;
            font-size: 20px;
            pointer-events: none;
            z-index: 9996;
            animation: heartFloat 4s forwards;
        }

        @keyframes heartFloat {
            0% { transform: translateY(0) scale(1); opacity: 1; }
            100% { transform: translateY(-200px) scale(1.5); opacity: 0; }
        }

        /* ===== DAYS COUNTER ===== */
        .days-counter {
            background: linear-gradient(45deg, #8b4513, #cd853f);
            color: white;
            padding: 15px;
            border-radius: 60px;
            font-size: 1.3rem;
            margin: 15px 0;
            border: 3px solid #ffd700;
        }

        .hidden {
            display: none !important;
        }

        /* ===== VOICE MESSAGE SECTION WITH PLAY/PAUSE ===== */
        .voice-section {
            margin: 20px 0;
            padding: 20px;
            background: linear-gradient(135deg, #9b59b6, #8e44ad);
            border-radius: 30px;
            border: 3px solid #f1c40f;
        }

        .voice-controls {
            display: flex;
            gap: 15px;
            justify-content: center;
            align-items: center;
            flex-wrap: wrap;
            margin-bottom: 15px;
        }

        .voice-btn {
            background: #25D366;
            border-bottom-color: #128C7E;
            margin: 5px;
            font-size: 1.1rem;
            padding: 12px 20px;
            width: auto;
            min-width: 120px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .voice-btn.play-btn {
            background: #25D366;
        }

        .voice-btn.pause-btn {
            background: #ff9800;
            border-bottom-color: #e68900;
        }

        .voice-btn.stop-btn {
            background: #f44336;
            border-bottom-color: #d32f2f;
        }

        .voice-btn:hover {
            transform: translateY(-2px);
        }

        .voice-status {
            font-size: 0.9rem;
            color: #fff;
            background: rgba(0,0,0,0.3);
            padding: 8px;
            border-radius: 20px;
            margin-top: 10px;
            display: inline-block;
        }

        .voice-note-hint {
            font-size: 0.85rem;
            color: #fff;
            background: rgba(0,0,0,0.2);
            padding: 8px;
            border-radius: 20px;
            margin-top: 10px;
        }

        /* ===== FINAL SCREEN ===== */
        .final-message {
            font-size: 3rem;
            background: linear-gradient(45deg, #ff1493, #ffd700, #ff1493);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: rainbow 2s infinite;
        }

        @keyframes rainbow {
            0% { filter: hue-rotate(0deg); }
            100% { filter: hue-rotate(360deg); }
        }

        .reset-btn {
            background: #c28d5a;
            margin-top: 20px;
        }

        /* ===== PHOTO FRAME ===== */
        .photo-frame {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            border: 5px solid #ffd700;
            margin: 15px auto;
            background: linear-gradient(45deg, #ffb6c1, #ffe4e1);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 4rem;
            box-shadow: 0 0 30px #ff69b4;
            animation: frameGlow 2s infinite;
            overflow: hidden;
            position: relative;
        }

        .photo-frame img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            position: absolute;
            top: 0;
            left: 0;
        }

        .photo-frame .placeholder {
            font-size: 4rem;
            z-index: 1;
        }

        @keyframes frameGlow {
            0% { box-shadow: 0 0 30px #ff69b4; }
            50% { box-shadow: 0 0 60px #ffd700; }
            100% { box-shadow: 0 0 30px #ff69b4; }
        }

        /* ===== BOOK STYLE PARAGRAPH ===== */
        .book-paragraph {
            background: #f9f3e7;
            border: 3px solid #c49a6c;
            border-radius: 30px;
            padding: 30px;
            margin: 30px 0;
            font-size: 1.2rem;
            line-height: 1.8;
            text-align: left;
            position: relative;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2), inset 0 0 30px #fff5e6;
            font-family: 'Georgia', serif;
            max-height: 400px;
            overflow-y: auto;
        }

        .book-paragraph::-webkit-scrollbar {
            width: 8px;
        }

        .book-paragraph::-webkit-scrollbar-track {
            background: #f1e1d1;
            border-radius: 10px;
        }

        .book-paragraph::-webkit-scrollbar-thumb {
            background: #c49a6c;
            border-radius: 10px;
        }

        .book-paragraph::before {
            content: "❝";
            font-size: 4rem;
            position: absolute;
            top: -10px;
            left: 10px;
            color: #c49a6c;
            opacity: 0.3;
            font-family: serif;
        }

        .book-paragraph::after {
            content: "❞";
            font-size: 4rem;
            position: absolute;
            bottom: -30px;
            right: 10px;
            color: #c49a6c;
            opacity: 0.3;
            font-family: serif;
        }

        .book-title {
            font-size: 1.8rem;
            color: #8b4513;
            margin-bottom: 20px;
            text-align: center;
            font-weight: bold;
        }

        .husband-love {
            font-size: 2rem;
            color: #ff1493;
            text-shadow: 2px 2px 0 #ffd700;
            animation: lovePulse 1.5s infinite;
        }

        @keyframes lovePulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }

        .takeback-only {
            background: #c14a4a;
            font-size: 1.5rem;
            padding: 15px 30px;
            margin: 20px;
            border-bottom: 5px solid #4e1414;
        }

        .wife-title {
            font-size: 2.2rem;
            color: #c2185b;
            text-shadow: 2px 2px 0 #ffd700;
            margin-bottom: 20px;
            animation: titleGlow 2s infinite;
        }

        @keyframes titleGlow {
            0% { text-shadow: 2px 2px 0 #ffd700; }
            50% { text-shadow: 0 0 20px #ff69b4, 2px 2px 0 #ffd700; }
            100% { text-shadow: 2px 2px 0 #ffd700; }
        }
    </style>
</head>
<body>
    <div id="app"></div>

    <script>
        (function() {
            // ===== CONFIGURATION =====
            const CONFIG = {
                hisName: "Shahid",
                meetingDate: "2023-12-28",
                photoPath: "images/pic1.jpeg",
                whatsappVoiceUrl: "voice/my-message.mp3"
            };

            // ===== GLOBAL VARIABLES =====
            let loveOn = false;
            let noButtonFontSize = 1.5;
            let openedGifts = new Array(5).fill(false);
            let currentAudio = null; // Store audio instance for controls
            
            const loveNames = ["Wifeyy", "Love", "Princess", "Moon", "Beautiful Gurlll", "Sweetheart"];

            function calculateDaysTogether() {
                const start = new Date(CONFIG.meetingDate);
                const today = new Date();
                const diffTime = Math.abs(today - start);
                const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
                return diffDays;

            // ===== VOICE MESSAGE WITH PLAY/PAUSE CONTROLS =====
            let audioPlayer = null;
            let isPlaying = false;

            function playVoiceNote() {
                if (!CONFIG.whatsappVoiceUrl) {
                    alert("📱 Voice file not found! Please add your voice note to: voice/my-message.mp3");
                    return;
                }

                if (audioPlayer && isPlaying) {
                    // Already playing
                    return;
                }

                if (audioPlayer && !isPlaying) {
                    // Resume
                    audioPlayer.play();
                    isPlaying = true;
                    updateStatusDisplay("🎵 Playing...");
                    showFloatingHearts(5);
                    updateButtonStyles();
                    return;
                }

                // Create new audio instance
                audioPlayer = new Audio(CONFIG.whatsappVoiceUrl);
                
                audioPlayer.addEventListener('ended', () => {
                    isPlaying = false;
                    updateStatusDisplay("✅ Finished playing");
                    updateButtonStyles();
                });
                
                audioPlayer.addEventListener('play', () => {
                    isPlaying = true;
                    updateStatusDisplay("🎵 Playing...");
                    updateButtonStyles();
                });
                
                audioPlayer.addEventListener('pause', () => {
                    isPlaying = false;
                    updateStatusDisplay("⏸ Paused");
                    updateButtonStyles();
                });
                
                audioPlayer.addEventListener('error', () => {
                    updateStatusDisplay("❌ Error playing. Check file.");
                    console.error("Audio playback failed");
                    fallbackVoiceMessage();
                });

                audioPlayer.play();
                showFloatingHearts(10);
                updateButtonStyles();
            }

            function pauseVoiceNote() {
                if (audioPlayer && isPlaying) {
                    audioPlayer.pause();
                    isPlaying = false;
                    updateStatusDisplay("⏸ Paused");
                    updateButtonStyles();
                }
            }

            function stopVoiceNote() {
                if (audioPlayer) {
                    audioPlayer.pause();
                    audioPlayer.currentTime = 0;
                    isPlaying = false;
                    updateStatusDisplay("⏹ Stopped");
                    updateButtonStyles();
                }
            }

            function updateStatusDisplay(message) {
                const statusDiv = document.getElementById('voiceStatus');
                if (statusDiv) {

                }

            }
